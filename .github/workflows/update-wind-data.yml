name: Update Wind Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest wind data from HKO
        run: |
          curl -sS -o wind.json "https://www.hko.gov.hk/wxinfo/ts/index_wind_c.json"

      - name: Commit & push if changed
        run: |
          if [ -f wind.json ] && [ -s wind.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wind.json
            git diff --cached --quiet || git commit -m "auto: update wind.json at $(date -u '+%Y-%m-%dT%H:%M')"
            git push
          fi
