name: Update Wind Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 確保 weather 資料夾存在，避免寫入失敗
      - name: Ensure weather directory exists
        run: mkdir -p weather

      # 將檔案直接下載到 weather 資料夾內
      - name: Fetch latest wind data from HKO
        run: |
          curl -sS -o weather/wind.json "https://www.hko.gov.hk/wxinfo/ts/index_wind_c.json"

      # 檢查 weather/wind.json 是否有變更並提交
      - name: Commit & push if changed
        run: |
          if [ -f weather/wind.json ] && [ -s weather/wind.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add weather/wind.json
            git diff --cached --quiet || git commit -m "auto: update wind.json at $(date -u '+%Y-%m-%dT%H:%M')"
            git push
          fi
