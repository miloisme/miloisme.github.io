<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>簡易香港天氣</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(at 40% 20%, #e0f2fe 0px, transparent 50%),
                              radial-gradient(at 80% 0%, #ffedd5 0px, transparent 50%),
                              radial-gradient(at 0% 50%, #fef3c7 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* 現代化跑馬燈 CSS 實現 */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            width: 100%;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        .marquee-container:hover .marquee-content {
            animation-play-state: paused;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 雨量標記樣式 */
        .rainfall-marker {
            font-weight: 700;
            font-size: 11px;
            text-align: center;
            border-radius: 50%;
            width: 28px !important;
            height: 28px !important;
            line-height: 26px;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .rainfall-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
        .rainfall-marker-zero { background-color: #f8fafc; color: #475569; border-color: #cbd5e1; }
        .rainfall-marker-low { background-color: #4ade80; color: #064e3b; }
        .rainfall-marker-medium { background-color: #facc15; color: #713f12; }
        .rainfall-marker-high { background-color: #ef4444; color: #fff; }
        .rainfall-marker-extreme { background-color: #000; color: #fff; border-color: #ef4444; }

        /* 隱藏滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 sm:p-6">
    
    <!-- 頂部標題 -->
    <header class="w-full max-w-6xl mx-auto bg-white/60 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 py-6 mb-6 text-center">
        <h3 class="text-sm font-medium text-slate-500 tracking-wider uppercase mb-1">miloisme.github.io</h3>
        <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 tracking-tight">簡易香港天氣</h1>
    </header>

    <!-- 特別天氣提示 (跑馬燈) -->
    <div id="special-weather-marquee" class="w-full max-w-6xl mx-auto bg-amber-100/80 backdrop-blur-sm border border-amber-200 rounded-xl shadow-sm p-4 mb-6 hidden cursor-pointer hover:bg-amber-100 transition-colors">
        <div class="flex items-center">
            <span class="flex-shrink-0 bg-amber-500 text-white text-xs font-bold px-2 py-1 rounded mr-3 animate-pulse">特別提示</span>
            <div class="marquee-container">

    <!-- 主要內容區 -->
    <main class="w-full max-w-6xl mx-auto space-y-6">
        
        <!-- 實時照片 -->

                </div>
                <div class="flex flex-col items-center group">
                    <span class="mb-2 text-slate-600 font-medium text-sm">太平山向東</span>
                    <div class="overflow-hidden rounded-lg shadow-sm w-full"><img src="https://www.hko.gov.hk/wxinfo/aws/hko_mica/vpa/latest_VPA.jpg" alt="太平山" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'%23e2e8f0\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2364748b\'>暫無影像</text></svg>'"/></div>
                </div>
                <div class="flex flex-col items-center group">
                    <span class="mb-2 text-slate-600 font-medium text-sm">尖沙咀</span>
                    <div class="overflow-hidden rounded-lg shadow-sm w-full"><img src="https://www.hko.gov.hk/wxinfo/aws/hko_mica/hk2/latest_HK2.jpg" alt="尖沙咀" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'%23e2e8f0\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2364748b\'>暫無影像</text></svg>'"/></div>
                </div>
                <div class="flex flex-col items-center group">
                    <span class="mb-2 text-slate-600 font-medium text-sm">長洲</span>
                    <div class="overflow-hidden rounded-lg shadow-sm w-full"><img src="https://www.hko.gov.hk/wxinfo/aws/hko_mica/cch/latest_CCH.jpg" alt="長洲" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'%23e2e8f0\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2364748b\'>暫無影像</text></svg>'"/></div>
                </div>
                <div class="flex flex-col items-center group">
                    <span class="mb-2 text-slate-600 font-medium text-sm">上水</span>
                    <div class="overflow-hidden rounded-lg shadow-sm w-full"><img src="https://www.hko.gov.hk/wxinfo/aws/hko_mica/elc/latest_ELC.jpg" alt="上水" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\'><rect width=\'100%\' height=\'100%\' fill=\'%23e2e8f0\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%2364748b\'>暫無影像</text></svg>'"/></div>
                </div>
            </div>
        </section>

        <!-- 實時天氣與警告 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 實時天氣 -->
            <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 p-6">
                <h2 class="text-xl font-bold text-slate-800 mb-5 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                    現時天氣
                </h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-lg">
                        <span class="text-slate-500 font-medium">氣溫</span>
                        <span id="temperature" class="text-2xl font-bold text-slate-800">--°C</span>
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-lg">
                        <span class="text-slate-500 font-medium">相對濕度</span>
                        <span id="humidity" class="text-xl font-bold text-blue-600">--%</span>
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-lg">
                        <span class="text-slate-500 font-medium">紫外綫指數</span>

                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-lg border border-blue-100 mt-4">

                        <p id="local-forecast" class="text-sm text-slate-700 leading-relaxed">載入中...</p>
                    </div>
                </div>
            </section>

            <!-- 天氣警告 -->
            <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 p-6 flex flex-col">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        生效警告
                    </h2>
                    <span class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded-full">點擊圖標查看</span>
                </div>
                <div id="warnings-data" class="flex flex-wrap gap-4 flex-grow content-start min-h-[150px]">
                    <div class="w-full h-full flex items-center justify-center">
                        <div class="animate-pulse flex space-x-2"><div class="w-3 h-3 bg-slate-300 rounded-full"></div><div class="w-3 h-3 bg-slate-300 rounded-full"></div><div class="w-3 h-3 bg-slate-300 rounded-full"></div></div>
                    </div>
                </div>
            </section>
        </div>

        <!-- 雨量地圖 -->
        <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 p-6">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                過去一小時各區雨量
            </h2>
            <div id="map" class="w-full h-[400px] rounded-xl border border-slate-200 z-0"></div>
            <div class="mt-3 flex flex-wrap gap-3 text-xs text-slate-600 justify-center">
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#f8fafc] border border-slate-300 mr-1"></span> 0mm</span>
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#4ade80] mr-1"></span> >0mm</span>
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#facc15] mr-1"></span> >20mm</span>
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#ef4444] mr-1"></span> >40mm</span>
                <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-[#000] mr-1"></span> >60mm</span>
            </div>
        </section>

        <!-- 九天預報圖表 -->
        <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    九天天氣預報
                </h2>
                <button onclick="openModal('forecast-modal')" class="text-sm text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-full transition-colors">查看詳情</button>
            </div>
            <div class="w-full h-72 relative">
                <canvas id="tempChart" class="cursor-pointer"></canvas>
            </div>
        </section>

        <!-- Windy 地圖 -->
        <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-white/50 p-6">
            <h2 class="text-xl font-bold text-slate-800 mb-5 flex items-center">
                <svg class="w-6 h-6 mr-2 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                實時動態地圖 (Windy)
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="rounded-xl overflow-hidden shadow-sm border border-slate-200">
                    <div class="bg-slate-100 py-2 text-center text-sm font-bold text-slate-700">雷達</div>
                    <iframe class="w-full h-64 md:h-72" loading="lazy" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=6&overlay=radar&product=radar&level=surface&lat=22.3&lon=114.17" frameborder="0"></iframe>
                </div>
                <div class="rounded-xl overflow-hidden shadow-sm border border-slate-200">
                    <div class="bg-slate-100 py-2 text-center text-sm font-bold text-slate-700">陣風</div>
                    <iframe class="w-full h-64 md:h-72" loading="lazy" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=6&overlay=wind&product=ecmwf&level=surface&lat=22.3&lon=114.17" frameborder="0"></iframe>
                </div>
                <div class="rounded-xl overflow-hidden shadow-sm border border-slate-200">
                    <div class="bg-slate-100 py-2 text-center text-sm font-bold text-slate-700">雨及雷暴</div>
                    <iframe class="w-full h-64 md:h-72" loading="lazy" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=6&overlay=rain&product=ecmwf&level=surface&lat=22.3&lon=114.17" frameborder="0"></iframe>
                </div>
            </div>
        </section>

        <footer class="text-center text-slate-400 text-sm py-6">
            資料來源：香港天文台 | 僅供參考
        </footer>
    </main>

    <!-- ================= Modals ================= -->
    
    <!-- 警告詳情 Modal -->
    <div id="warning-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeModalOnOutsideClick(event, 'warning-modal')">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] flex flex-col modal-enter">
            <div class="flex justify-between items-center p-5 border-b border-slate-100">
                <h2 id="warning-title" class="text-xl font-bold text-slate-800">警告詳情</h2>
                <button onclick="closeModal('warning-modal')" class="text-slate-400 hover:text-slate-700 transition-colors p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-5 overflow-y-auto no-scrollbar">
                <p id="warning-update-time" class="text-xs text-slate-500 mb-4 bg-slate-50 inline-block px-2 py-1 rounded"></p>
                <div id="warning-content" class="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm"></div>
            </div>
        </div>
    </div>

    <!-- 特別天氣 Modal -->
    <div id="special-weather-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeModalOnOutsideClick(event, 'special-weather-modal')">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col modal-enter">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-amber-50 rounded-t-2xl">
                <h2 class="text-lg font-bold text-amber-900 flex items-center"><svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>特別天氣提示</h2>
                <button onclick="closeModal('special-weather-modal')" class="text-amber-700 hover:text-amber-900 transition-colors p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-5 overflow-y-auto no-scrollbar">
                <div id="special-weather-content" class="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm"></div>
            </div>
        </div>
    </div>

    <!-- 九天預報 Modal -->
    <div id="forecast-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="closeModalOnOutsideClick(event, 'forecast-modal')">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col modal-enter">
            <div class="flex justify-between items-center p-5 border-b border-slate-100">
                <h2 class="text-xl font-bold text-slate-800">詳細九天天氣預報</h2>
                <button onclick="closeModal('forecast-modal')" class="text-slate-400 hover:text-slate-700 transition-colors p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-5 overflow-y-auto no-scrollbar bg-slate-50/50">
                <div id="forecast-data" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- ================= JavaScript 邏輯 ================= -->
    <script>
        // 全局變量
        let forecastData = [];
        let leafletMap = null;
        let tempChartInstance = null;

        // 映射表
        const iconMap = {
            "WTS": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/ts.issuing.gif",
            "WHOT": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/vhot.issuing.gif",

            "TC10": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/tc10.issuing.gif",
            "WCOLD": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/cold.issuing.gif",
            "WFROST": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/frost.issuing.gif",
            "WFIREY": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/firey.issuing.gif",
            "WFIRER": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/firer.issuing.gif",
            "WL": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/landslip.issuing.gif",
            "WFNTSA": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/ntfl.issuing.gif",
            "WTMW": "https://www.hko.gov.hk/tc/wxinfo/dailywx/images/tsunami-warn.issuing.gif"
        };

        const subtypeMap = {
            "WFIREY": "黃色火災危險警告", "WFIRER": "紅色火災危險警告", "WFROST": "霜凍警告",
            "WHOT": "酷熱天氣警告", "WCOLD": "寒冷天氣警告", "WMSGNL": "強烈季候風信號",
            "TC1": "一號戒備信號", "TC3": "三號強風信號", "TC8NE": "八號東北烈風信號",
            "TC8SE": "八號東南烈風信號", "TC8SW": "八號西南烈風信號", "TC8NW": "八號西北烈風信號",
            "TC9": "九號烈風增強信號", "TC10": "十號颶風信號", "WRAINA": "黃色暴雨警告",
            "WRAINR": "紅色暴雨警告", "WRAINB": "黑色暴雨警告", "WFNTSA": "新界北水浸特別報告",
            "WL": "山泥傾瀉警告", "WTMW": "海嘯警告", "WTS": "雷暴警告"
        };

        // Modal 控制
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function closeModalOnOutsideClick(e, id) {
            if (e.target.id === id) closeModal(id);
        }

        // 綁定特別天氣點擊事件
        document.getElementById('special-weather-marquee').addEventListener('click', () => openModal('special-weather-modal'));
        document.getElementById('tempChart').addEventListener('click', () => openModal('forecast-modal'));

        // 獲取實時天氣
        async function fetchCurrentWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();
                
                const temp = data.temperature.data[0];
                document.getElementById('temperature').innerText = `${temp.value}°${temp.unit}`;
                
                const humidity = data.humidity.data[0];
                document.getElementById('humidity').innerText = `${humidity.value}%`;
                
                const uvEl = document.getElementById('uv-index');
                if (data.uvindex?.data?.length > 0) {
                    const uv = data.uvindex.data[0];
                    uvEl.innerText = `${uv.value} (${uv.desc})`;
                    uvEl.className = uv.value > 5 ? 'text-lg font-bold text-red-500' : 'text-lg font-bold text-purple-600';
                } else {
                    uvEl.innerText = '不適用';
                    uvEl.className = 'text-lg font-bold text-slate-400';
                }
            } catch (e) {
                console.error('Failed to fetch current weather', e);
            }
        }

        // 獲取本港預報
        async function fetchLocalForecast() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc');
                const data = await res.json();
                const text = [data.generalSituation, data.forecastPeriod, data.forecastDesc, data.outlook].filter(Boolean).join('<br><br>');
                document.getElementById('local-forecast').innerHTML = text || '暫無資料';
            } catch (e) {
                document.getElementById('local-forecast').innerText = '載入失敗';
            }
        }

        // 獲取九天預報
        async function fetchForecast() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const data = await res.json();
                forecastData = data.weatherForecast;
                renderForecastChart();
                populateForecastModal();
            } catch (e) {
                console.error('Failed to fetch forecast', e);
            }
        }

        // 渲染圖表 (Chart.js)
        function renderForecastChart() {
            const ctx = document.getElementById('tempChart').getContext('2d');
            const dates = forecastData.map(f => `${f.forecastDate.substring(4,6)}/${f.forecastDate.substring(6,8)}`);
            const maxTemps = forecastData.map(f => f.forecastMaxtemp.value);
            const minTemps = forecastData.map(f => f.forecastMintemp.value);

            // 創建漸層
            const gradientMax = ctx.createLinearGradient(0, 0, 0, 300);
            gradientMax.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
            gradientMax.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

            const gradientMin = ctx.createLinearGradient(0, 0, 0, 300);
            gradientMin.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            gradientMin.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            if (tempChartInstance) tempChartInstance.destroy();
            
            tempChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '最高溫度 (°C)',
                            data: maxTemps,
                            borderColor: '#ef4444',
                            backgroundColor: gradientMax,
                            borderWidth: 2,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#ef4444',
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '最低溫度 (°C)',
                            data: minTemps,
                            borderColor: '#3b82f6',
                            backgroundColor: gradientMin,
                            borderWidth: 2,
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#3b82f6',
                            pointRadius: 4,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { grid: { borderDash: [4, 4], color: '#e2e8f0' } },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 10, cornerRadius: 8 }
                    }
                }
            });
        }

        // 填充九天預報 Modal
        function populateForecastModal() {
            const container = document.getElementById('forecast-data');
            container.innerHTML = forecastData.map(f => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-center mb-3 border-b border-slate-50 pb-2">
                        <h3 class="font-bold text-slate-700">${f.forecastDate.substring(4,6)}月${f.forecastDate.substring(6,8)}日 <span class="text-sm font-normal text-slate-500">(${f.week})</span></h3>
                    </div>
                    <div class="flex justify-between items-center mb-3">
                        <div class="text-center"><span class="block text-xs text-slate-400">最低</span><span class="text-lg font-bold text-blue-500">${f.forecastMintemp.value}°C</span></div>
                        <div class="text-center"><span class="block text-xs text-slate-400">最高</span><span class="text-lg font-bold text-red-500">${f.forecastMaxtemp.value}°C</span></div>
                        <div class="text-center"><span class="block text-xs text-slate-400">降雨概率</span><span class="text-sm font-bold text-slate-600">${f.PSR}</span></div>
                    </div>
                    <p class="text-sm text-slate-600 bg-slate-50 p-2 rounded">${f.forecastWeather}</p>
                </div>
            `).join('');
        }

        // 獲取天氣警告
        async function fetchWarnings() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warningInfo&lang=tc');
                const data = await res.json();
                const container = document.getElementById('warnings-data');
                const details = data.details || [];
                
                if (details.length === 0) {
                    container.innerHTML = '<div class="w-full h-full flex items-center justify-center"><p class="text-slate-400 font-medium">✅ 目前沒有生效的天氣警告</p></div>';
                    return;
                }
                
                container.innerHTML = '';
                details.forEach(w => {
                    const code = w.subtype || w.warningStatementCode;
                    const iconSrc = iconMap[code];
                    if (!iconSrc) return;
                    
                    const name = subtypeMap[code] || code;
                    const time = new Date(w.updateTime).toLocaleString('zh-HK', { hour12: false });
                    const content = w.contents?.join('\n') || "無詳細內容";
                    
                    const img = document.createElement('img');
                    img.src = iconSrc;
                    img.alt = name;
                    img.title = name;
                    img.className = "w-14 h-14 cursor-pointer rounded-lg shadow-sm hover:scale-110 hover:shadow-md transition-all duration-200 border border-slate-100 bg-white p-1";
                    
                    img.onclick = () => {
                        document.getElementById('warning-title').innerText = name;
                        document.getElementById('warning-update-time').innerText = `更新時間: ${time}`;
                        document.getElementById('warning-content').innerText = content;
                        openModal('warning-modal');
                    };
                    container.appendChild(img);
                });
            } catch (e) {
                document.getElementById('warnings-data').innerHTML = '<p class="text-red-500">無法載入天氣警告</p>';
            }
        }

        // 獲取特別天氣提示
        async function fetchSpecialWeatherTips() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const data = await res.json();
                const swt = data.swt || [];
                
                const marqueeContainer = document.getElementById('special-weather-marquee');
                if (swt.length === 0) {
                    marqueeContainer.classList.add('hidden');
                    return;
                }
                
                let modalHtml = '';
                let marqueeText = '';
                
                swt.forEach((tip, index) => {
                    const time = new Date(tip.updateTime).toLocaleString('zh-HK', { hour12: false });
                    modalHtml += `<div class="mb-4 last:mb-0"><span class="text-xs font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded">${time}</span><p class="mt-2 text-slate-700">${tip.desc}</p></div>`;
                    marqueeText += `【${time}】${tip.desc} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`;
                });
                
                document.getElementById('special-weather-content').innerHTML = modalHtml;
                document.getElementById('marquee-content').innerHTML = marqueeText;
                marqueeContainer.classList.remove('hidden');
            } catch (e) {
                console.error('Failed to fetch special weather tips', e);
            }
        }

        // 獲取雨量數據並初始化地圖
        async function fetchRainfallData() {
            if (!leafletMap) {
                leafletMap = L.map('map', { scrollWheelZoom: false }).setView([22.3193, 114.1694], 11);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO'
                }).addTo(leafletMap);
            }

            const stationCoordinates = {
                '上水': [22.505, 114.127], '大埔墟': [22.444, 114.171], '濕地公園': [22.467, 114.004],
                '屯門': [22.391, 113.975], '沙田': [22.402, 114.184], '香港國際機場': [22.315, 113.936],
                '昂坪': [22.263, 113.913], '坪洲': [22.265, 114.038], '長洲': [22.208, 114.029],
                '橫瀾島': [22.186, 114.301], '赤柱': [22.218, 114.210], '黃竹坑': [22.247, 114.171],
                '跑馬地': [22.268, 114.185], '山頂': [22.265, 114.146], '筲箕灣': [22.279, 114.228],
                '清水灣': [22.285, 114.294], '將軍澳': [22.317, 114.258], '觀塘': [22.312, 114.223],
                '尖沙咀': [22.302, 114.174], '新蒲崗': [22.336, 114.195], '深水埗': [22.333, 114.149],
                '西貢': [22.382, 114.272], '滘西洲': [22.371, 114.363], '荃灣': [22.372, 114.138]
            };

            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/hourlyRainfall.php?lang=tc');
                const data = await res.json();
                
                // 清除舊標記
                leafletMap.eachLayer((layer) => {
                    if (layer instanceof L.Marker) leafletMap.removeLayer(layer);
                });

                data.hourlyRainfall.forEach(station => {
                    let name = station.automaticWeatherStation === '香港天文台' ? '尖沙咀' : station.automaticWeatherStation;
                    const coords = stationCoordinates[name];
                    
                    if (coords) {
                        const isM = station.value === 'M';
                        const val = isM ? 0 : parseFloat(station.value);
                        const displayVal = isM ? 'M' : Math.round(val);
                        
                        let markerClass = 'rainfall-marker-zero';
                        if (!isM && val > 0) {
                            if (val >= 60) markerClass = 'rainfall-marker-extreme';
                            else if (val >= 40) markerClass = 'rainfall-marker-high';
                            else if (val >= 20) markerClass = 'rainfall-marker-medium';
                            else markerClass = 'rainfall-marker-low';
                        }

                        const icon = L.divIcon({
                            className: `rainfall-marker ${markerClass}`,
                            html: displayVal,
                            iconSize: [28, 28],
                            iconAnchor: [14, 14]
                        });

                        L.marker(coords, { icon }).addTo(leafletMap)
                         .bindPopup(`<div class="text-center font-bold text-slate-700">${name}</div><div class="text-sm text-slate-500 mt-1">過去一小時雨量: <span class="text-blue-600 font-bold">${isM ? '維護中' : val + ' mm'}</span></div>`);
                    }
                });
            } catch (e) {
                console.error('Failed to fetch rainfall data', e);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchCurrentWeather();
            fetchLocalForecast();
            fetchForecast();
            fetchWarnings();
            fetchSpecialWeatherTips();
            fetchRainfallData();
            
            // 每 5 分鐘自動刷新數據
            setInterval(() => {
                fetchCurrentWeather();
                fetchWarnings();
                fetchSpecialWeatherTips();
                fetchRainfallData();
            }, 300000);
        });
    </script>
</body>
</html>
